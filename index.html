<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$HYPER Allocation Checker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#0a0a0f;font-family:Inter,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.container{position:relative;z-index:10;width:100%;max-width:420px;padding:20px;text-align:center}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:36px 28px;backdrop-filter:blur(20px)}
.logo{font-size:13px;color:rgba(255,255,255,0.4);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px}
h1{font-size:32px;font-weight:800;background:linear-gradient(135deg,#00f5ff,#bf5af2,#ff375f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.subtitle{font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:28px}
.fid-display{background:rgba(0,245,255,0.08);border:1px solid rgba(0,245,255,0.2);border-radius:12px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:rgba(255,255,255,0.5)}
.fid-display span{color:#00f5ff;font-weight:600}
.allocation-box{background:linear-gradient(135deg,rgba(0,245,255,0.1),rgba(191,90,242,0.1));border:1px solid rgba(0,245,255,0.25);border-radius:16px;padding:28px 20px;margin-bottom:20px}
.allocation-label{font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.allocation-amount{font-size:48px;font-weight:900;background:linear-gradient(135deg,#00f5ff,#bf5af2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:4px}
.allocation-token{font-size:16px;color:rgba(255,255,255,0.5);font-weight:600}
.stats-row{display:flex;gap:12px;margin-bottom:24px}
.stat-box{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 10px}
.stat-label{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.stat-value{font-size:15px;font-weight:700;color:#fff}
.btn-row{display:flex;gap:10px}
.btn-share{flex:1;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#00f5ff,#bf5af2);color:#000;font-weight:800;font-size:14px;cursor:pointer}
.btn-more{padding:14px 18px;border:1px solid rgba(255,255,255,0.15);border-radius:12px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.6);font-weight:600;font-size:14px;cursor:pointer}
.loading{color:rgba(255,255,255,0.5);font-size:14px;padding:20px 0}
.zero-box{background:rgba(255,55,95,0.08);border:1px solid rgba(255,55,95,0.2);border-radius:12px;padding:16px;margin-bottom:20px;font-size:13px;color:rgba(255,255,255,0.5)}
.footer{margin-top:16px;font-size:11px;color:rgba(255,255,255,0.2)}
.footer a{color:rgba(0,245,255,0.4);text-decoration:none}
</style>
</head>
<body>
<canvas id="waveCanvas"></canvas>
<div class="container">
  <div class="card">
    <div class="logo">Farcaster x Hypersnap</div>
    <h1>$HYPER Genesis</h1>
    <p class="subtitle">Check your retro reward allocation</p>
    <div class="fid-display">Your FID: <span id="fidDisplay">Detecting...</span></div>
    <div id="mainContent" class="loading">Loading your allocation...</div>
    <div class="footer">Built by <a href="https://warpcast.com/3hundred">@3hundred</a> · Data from <a href="https://github.com/farcasterorg">@cassie</a></div>
  </div>
</div>
<script>
const canvas=document.getElementById('waveCanvas');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight});
let t=0;
function drawWaves(){
ctx.clearRect(0,0,canvas.width,canvas.height);
[{color:'rgba(0,245,255,0.12)',freq:0.003,amp:80,speed:0.012,offset:0},{color:'rgba(191,90,242,0.10)',freq:0.004,amp:60,speed:0.018,offset:2},{color:'rgba(255,55,95,0.08)',freq:0.002,amp:100,speed:0.008,offset:4}].forEach(w=>{
ctx.beginPath();ctx.moveTo(0,canvas.height/2);
for(let x=0;x<=canvas.width;x++){const y=canvas.height/2+Math.sin(x*w.freq+t*w.speed+w.offset)*w.amp+Math.sin(x*w.freq*2+t*w.speed*1.5)*(w.amp*0.4);ctx.lineTo(x,y)}
ctx.lineTo(canvas.width,canvas.height);ctx.lineTo(0,canvas.height);ctx.closePath();ctx.fillStyle=w.color;ctx.fill()});
t++;requestAnimationFrame(drawWaves)}
drawWaves();
const REWARDS_URL='https://raw.githubusercontent.com/Blue-deve/hyper-rewards/main/rewards.json';
let rewardsData={},userFID=null;
async function loadRewards(){try{const r=await fetch(REWARDS_URL);rewardsData=await r.json()}catch(e){console.error(e)}}
function getFID(){if(window.Farcaster?.context)return window.Farcaster.context.user?.fid||null;return new URLSearchParams(window.location.search).get('fid')}
function formatNumber(n){if(n>=1000000)return(n/1000000).toFixed(2)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toFixed(2)}
function getRank(t){if(t>=10000)return'🏆 Legend';if(t>=5000)return'💎 Diamond';if(t>=1000)return'🥇 Gold';if(t>=500)return'🥈 Silver';if(t>0)return'🥉 Bronze';return'—'}
function shareResult(fid,tokens){
const text=tokens>0?`🔥 I got ${formatNumber(tokens)} $HYPER in the Genesis allocation!\n\nCheck yours 👇\nBuilt by @3hundred | Based on FIP-19/Hypersnap by @cassie`:`Checked my $HYPER Genesis allocation — built by @3hundred\nBased on FIP-19/Hypersnap by @cassie\nCheck yours 👇`;
if(window.Farcaster?.actions)window.Farcaster.actions.openUrl(`https://warpcast.com/~/compose?text=${encodeURIComponent(text)}`);
else window.open(`https://warpcast.com/~/compose?text=${encodeURIComponent(text)}`,'_blank')}
function showMore(){if(window.Farcaster?.actions)window.Farcaster.actions.openUrl('https://github.com/farcasterorg/hypersnap');else window.open('https://github.com/farcasterorg/hypersnap','_blank')}
function renderApp(fid,tokens){
const c=document.getElementById('mainContent');
document.getElementById('fidDisplay').textContent=fid||'Unknown';
if(!fid){c.innerHTML='<div class="zero-box">⚠️ Open this app inside Farcaster!</div>';return}
if(!tokens||tokens===0){c.innerHTML=`<div class="zero-box">😔 FID <b>${fid}</b> has no $HYPER allocation.</div><div class="btn-row"><button class="btn-share" onclick="shareResult(${fid},0)">📤 Share</button><button class="btn-more" onclick="showMore()">••• More</button></div>`;return}
c.innerHTML=`<div class="allocation-box"><div class="allocation-label">Your Allocation</div><div class="allocation-amount">${formatNumber(tokens)}</div><div class="allocation-token">$HYPER tokens</div></div><div class="stats-row"><div class="stat-box"><div class="stat-label">FID</div><div class="stat-value">#${fid}</div></div><div class="stat-box"><div class="stat-label">Rank</div><div class="stat-value">${getRank(tokens)}</div></div><div class="stat-box"><div class="stat-label">Round</div><div class="stat-value">Genesis</div></div></div><div class="btn-row"><button class="btn-share" onclick="shareResult(${fid},${tokens})">📤 Share</button><button class="btn-more" onclick="showMore()">••• More</button></div>`}
async function init(){await loadRewards();userFID=getFID();const tokens=userFID?(rewardsData[String(userFID)]||0):0;renderApp(userFID,tokens)}
init();
</script>
</body>
</html>
